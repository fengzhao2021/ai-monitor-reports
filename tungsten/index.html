        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 20px 0 30px;
        }
        h1 {
            color: #4ecdc4;
            font-size: 2rem;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            color: #aaa;
            font-size: 0.9rem;
        }
        .btn-group {
            display: flex;
            gap: 5px;
        }
        .btn {
            padding: 8px 16px;
            border: 1px solid #4ecdc4;
            background: transparent;
            color: #4ecdc4;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(78, 205, 196, 0.2);
        }
        .btn.active {
            background: #4ecdc4;
            color: #1a1a2e;
        }
        .chart-container {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        #main-chart {
            width: 100%;
            height: 500px;
        }
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .stat-card .label {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 5px;
        }
        .stat-card .value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #4ecdc4;
        }
        .stat-card .change {
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .stat-card .change.up {
            color: #ee6666;
        }
        .stat-card .change.down {
            color: #91cc75;
        }
        .ma-legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .ma-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.85rem;
        }
        .ma-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        footer {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 0.85rem;
        }
        footer a {
            color: #4ecdc4;
            text-decoration: none;
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 1.5rem;
            }
            #main-chart {
                height: 400px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .control-group {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🪨 钨价走势图</h1>
            <p class="subtitle">Tungsten Price Chart | 数据来源: Qwen联网搜索</p>
        </header>

        <div class="controls">
            <div class="control-group">
                <label>产品:</label>
                <div class="btn-group" id="product-btns">
                    <button class="btn active" data-product="apt_china">国内APT</button>
                    <button class="btn" data-product="apt_europe">欧洲APT</button>
                    <button class="btn" data-product="tungsten_powder">钨粉</button>
                    <button class="btn" data-product="tungsten_carbide">碳化钨</button>
                </div>
            </div>
            <div class="control-group">
                <label>周期:</label>
                <div class="btn-group" id="period-btns">
                    <button class="btn active" data-period="day">日线</button>
                    <button class="btn" data-period="week">周线</button>
                    <button class="btn" data-period="month">月线</button>
                </div>
            </div>
            <div class="control-group">
                <label>均线:</label>
                <div class="btn-group" id="ma-btns">
                    <button class="btn active" data-ma="ma5">MA5</button>
                    <button class="btn active" data-ma="ma10">MA10</button>
                    <button class="btn active" data-ma="ma20">MA20</button>

            </div>
        </div>

        <div class="chart-container">
            <div id="main-chart"></div>
            <div class="ma-legend">
                <div class="ma-item"><span class="ma-dot" style="background:#ffd700"></span> MA5</div>
                <div class="ma-item"><span class="ma-dot" style="background:#ff6b6b"></span> MA10</div>
                <div class="ma-item"><span class="ma-dot" style="background:#4ecdc4"></span> MA20</div>
            </div>
        </div>

        <div class="stats-panel" id="stats-panel">
            <div class="stat-card">
                <div class="label">最新价格</div>
                <div class="value" id="latest-price">--</div>
                <div class="change" id="latest-change">--</div>
            </div>
            <div class="stat-card">
                <div class="label">30日最高</div>
                <div class="value" id="high-30d">--</div>
            </div>
            <div class="stat-card">
                <div class="label">30日最低</div>

            </div>
            <div class="stat-card">

                <div class="value" id="change-30d">--</div>
            </div>
        </div>

        <footer>

        // 当前状态
        let currentProduct = 'apt_china';
        let currentPeriod = 'day';
        let showMA = { ma5: true, ma10: true, ma20: true };

        // 初始化图表
        const chart = echarts.init(document.getElementById('main-chart'));

        // 计算移动平均线
        function calculateMA(data, period) {
            const result = [];
            for (let i = 0; i < data.length; i++) {
                if (i < period - 1) {
                    result.push(null);
                } else {
                    let sum = 0;
                    for (let j = 0; j < period; j++) {
                        sum += data[i - j].price;
                    }
                    result.push((sum / period).toFixed(2));
                }
            }
            return result;
        }

        // 聚合数据（周/月）
        function aggregateData(data, period) {
            if (period === 'day') return data;

            const grouped = {};
            data.forEach(item => {
                const d = new Date(item.date);
                let key;
                if (period === 'week') {
                    // 按周分组
                    const weekStart = new Date(d);
                    weekStart.setDate(d.getDate() - d.getDay());
                    key = weekStart.toISOString().split('T')[0];
                } else {
                    // 按月分组
                    key = item.date.substring(0, 7);
                }

                if (!grouped[key]) {
                    grouped[key] = [];
                }
                grouped[key].push(item);
            });

            // 计算OHLC
            return Object.entries(grouped).map(([key, items]) => {
                const prices = items.map(i => i.price);
                return {
                    date: key,
                    open: items[0].price,
                    close: items[items.length - 1].price,
                    high: Math.max(...prices),
                    low: Math.min(...prices),
                    price: items[items.length - 1].price
                };
            }).sort((a, b) => a.date.localeCompare(b.date));
        }

        // 更新图表
        function updateChart() {
            const productData = chartData[currentProduct];
            if (!productData || !productData.data || productData.data.length === 0) {
                chart.setOption({
                    title: {
                        text: '暂无数据',
                        left: 'center',
                        top: 'center',
                        textStyle: { color: '#888' }
                    }
                });
                return;
            }

            const rawData = productData.data;
            const data = aggregateData(rawData, currentPeriod);

            const dates = data.map(d => d.date);
            const prices = data.map(d => d.price);

            // K线数据 [open, close, low, high]
            const klineData = data.map(d => {
                if (d.open !== undefined) {
                    return [d.open, d.close, d.low, d.high];
                }
                // 单日数据模拟OHLC
                const variance = d.price * 0.005; // 0.5%波动
                return [d.price, d.price, d.price - variance, d.price + variance];
            });

            // 计算均线
            const ma5 = calculateMA(data, 5);
            const ma10 = calculateMA(data, 10);
            const ma20 = calculateMA(data, 20);

            const series = [
                {
                    name: productData.product_name,
                    type: 'candlestick',
                    data: klineData,
                    itemStyle: {
                        color: '#ee6666',
                        color0: '#91cc75',
                        borderColor: '#ee6666',
                        borderColor0: '#91cc75'
                    }
                }
            ];

            if (showMA.ma5) {
                series.push({
                    name: 'MA5',
                    type: 'line',
                    data: ma5,
                    smooth: true,
                    lineStyle: { width: 1, color: '#ffd700' },
                    symbol: 'none'
                });
            }
            if (showMA.ma10) {
                series.push({
                    name: 'MA10',
                    type: 'line',
                    data: ma10,
                    smooth: true,
                    lineStyle: { width: 1, color: '#ff6b6b' },
                    symbol: 'none'
                });
            }
            if (showMA.ma20) {
                series.push({
                    name: 'MA20',
                    type: 'line',
                    data: ma20,
                    smooth: true,
                    lineStyle: { width: 1, color: '#4ecdc4' },
                    symbol: 'none'
                });
            }

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: {
                        type: 'cross'
                    },
                    backgroundColor: 'rgba(26,26,46,0.9)',
                    borderColor: '#4ecdc4',
                    textStyle: { color: '#e0e0e0' },
                    formatter: function(params) {
                        let result = params[0].axisValue + '<br/>';
                        params.forEach(p => {
                            if (p.seriesType === 'candlestick') {
                                const data = p.data;
                                result += `${p.marker} 开: ${data[1]}<br/>`;
                                result += `高: ${data[4]} 低: ${data[3]}<br/>`;
                                result += `收: ${data[2]}<br/>`;
                            } else {
                                result += `${p.marker} ${p.seriesName}: ${p.value || '--'}<br/>`;
                            }
                        });
                        return result;
                    }
                },
                legend: {
                    data: [productData.product_name, 'MA5', 'MA10', 'MA20'],
                    top: 10,
                    textStyle: { color: '#aaa' }
                },
                grid: {
                    left: '10%',
                    right: '5%',
                    bottom: '15%',
                    top: '15%'
                },
                xAxis: {
                    type: 'category',
                    data: dates,
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#888' },
                    splitLine: { show: false }
                },
                yAxis: {
                    type: 'value',
                    name: productData.unit,
                    nameTextStyle: { color: '#888' },
                    axisLine: { lineStyle: { color: '#444' } },
                    axisLabel: { color: '#888' },
                    splitLine: { lineStyle: { color: '#333' } },
                    scale: true
                },
                dataZoom: [
                    {
                        type: 'inside',
                        start: Math.max(0, 100 - 60 / data.length * 100),
                        end: 100
                    },
                    {
                        type: 'slider',
                        start: Math.max(0, 100 - 60 / data.length * 100),
                        end: 100,
                        height: 20,
                        bottom: 10,
                        borderColor: '#444',
                        backgroundColor: '#1a1a2e',
                        fillerColor: 'rgba(78,205,196,0.2)',
                        handleStyle: { color: '#4ecdc4' },
                        textStyle: { color: '#888' }
                    }
                ],
                series: series
            };

            chart.setOption(option, true);
            updateStats(rawData, productData);
        }

        // 更新统计面板
        function updateStats(data, productData) {
            if (!data || data.length === 0) return;

            const latest = data[data.length - 1];
            const latestPrice = latest.price;
            const unit = productData.unit;

            document.getElementById('latest-price').textContent =
                latestPrice.toLocaleString() + ' ' + unit;

            // 最新涨跌
            const changeEl = document.getElementById('latest-change');
            if (data.length >= 2) {
                const prevPrice = data[data.length - 2].price;
                const change = ((latestPrice - prevPrice) / prevPrice * 100).toFixed(2);
                changeEl.textContent = (change >= 0 ? '+' : '') + change + '%';
                changeEl.className = 'change ' + (change >= 0 ? 'up' : 'down');
            } else {
                changeEl.textContent = '--';
            }

            // 30日数据
            const last30 = data.slice(-30);
            const prices30 = last30.map(d => d.price);

            document.getElementById('high-30d').textContent =
                Math.max(...prices30).toLocaleString() + ' ' + unit;
            document.getElementById('low-30d').textContent =
                Math.min(...prices30).toLocaleString() + ' ' + unit;

            if (last30.length >= 2) {
                const firstPrice = last30[0].price;
                const change30 = ((latestPrice - firstPrice) / firstPrice * 100).toFixed(2);
                const change30El = document.getElementById('change-30d');
                change30El.textContent = (change30 >= 0 ? '+' : '') + change30 + '%';
                change30El.className = 'value ' + (change30 >= 0 ? 'up' : 'down');
            }
        }

        // 绑定事件
        document.querySelectorAll('#product-btns .btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#product-btns .btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentProduct = this.dataset.product;
                updateChart();
            });
        });

        document.querySelectorAll('#period-btns .btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#period-btns .btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentPeriod = this.dataset.period;
                updateChart();
            });
        });

        document.querySelectorAll('#ma-btns .btn').forEach(btn => {
            btn.addEventListener('click', function() {
                this.classList.toggle('active');
                showMA[this.dataset.ma] = this.classList.contains('active');
                updateChart();
            });
        });

        // 窗口大小变化时重绘
        window.addEventListener('resize', () => chart.resize());

        // 初始化
        updateChart();
    </script>
